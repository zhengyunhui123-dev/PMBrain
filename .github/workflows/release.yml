name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: gbrain-darwin-arm64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: gbrain-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.13
      - run: bun install
      - run: bun test
      - run: bun build --compile --target=${{ matrix.target }} --outfile bin/${{ matrix.artifact }} src/cli.ts
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ matrix.artifact }}
          path: bin/${{ matrix.artifact }}

  desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.14
      - name: Verify desktop version matches tag
        shell: pwsh
        run: |
          $version = (Get-Content desktop/package.json | ConvertFrom-Json).version
          if ("v$version" -ne "${{ github.ref_name }}") { throw "desktop version $version does not match tag ${{ github.ref_name }}" }
      - run: bun install --frozen-lockfile
      - run: bun run build:admin
      - name: Install desktop dependencies
        working-directory: desktop
        run: bun install --frozen-lockfile --trust
      - name: Build Windows installer and updater metadata
        working-directory: desktop
        run: |
          bun run build
          bun run build:sidecar
          bunx electron-builder --win nsis --publish never
          bun run verify:package
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: pmbrain-desktop-windows
          path: |
            desktop/dist/PMBrain-Windows-x64-Setup-*.exe
            desktop/dist/PMBrain-Windows-x64-Setup-*.exe.blockmap
            desktop/dist/latest.yml

  release:
    needs: [build, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2
        with:
          files: |
            artifacts/gbrain-darwin-arm64/gbrain-darwin-arm64
            artifacts/gbrain-linux-x64/gbrain-linux-x64
            artifacts/pmbrain-desktop-windows/PMBrain-Windows-x64-Setup-*.exe
            artifacts/pmbrain-desktop-windows/PMBrain-Windows-x64-Setup-*.exe.blockmap
            artifacts/pmbrain-desktop-windows/latest.yml
          generate_release_notes: true
