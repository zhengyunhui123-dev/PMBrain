[test]
# PGLite WASM 冷启动 + initSchema() 在负载较重的机器上运行约 5-20 秒。
# 默认 5 秒对于这些测试的 beforeAll 钩子来说太短。60 秒是我们在最慢的
# 冷初始化路径中观察到的经验上限。
#
# v0.26.4：scripts/run-unit-parallel.sh 和 scripts/run-unit-shard.sh
# 也显式传递 `--timeout=60000`，因此无论通过包装器还是直接
# 通过 bun test 调用测试，上限都是一致的。
timeout = 60_000

# v0.37 修复波：在 any test runs 之前将网关默认值固定为 legacy OpenAI/1536，
# 因此具有硬编码 1536-d Float32Array fixtures 的 20+ 测试文件
# 仍然匹配架构。v0.37 的生产默认值是 ZE/1280；
# 想要新默认值的测试在他们自己的 beforeAll 中显式调用 configureGateway()。
preload = ["./test/helpers/legacy-embedding-preload.ts"]
