storage:
  # Directories that are version-controlled — human-curated, edited by hand.
  db_tracked:
    - people/
    - companies/
    - deals/
    - concepts/
    - yc/
    - ideas/
    - projects/

  # Directories persisted via the brain database only — bulk machine-generated
  # content. .gitignored automatically by `pmbrain sync`. Restorable from the DB
  # via `pmbrain export --restore-only`.
  db_only:
    - media/x/
    - media/articles/
    - meetings/transcripts/
