api_version: gbrain-schema-pack-v1
name: pm-schema-pack
description: 项目管理领域模型 — 7 种页面类型
version: 1.0.0
gbrain_min_version: 0.41.0
extends: gbrain-base-v2
borrow_from: []
takes_kinds:
  - fact
  - take
  - bet
  - hunch

page_types:
  - name: project
    primitive: entity
    path_prefixes:
      - projects/
    extractable: true
    expert_routing: true

  - name: milestone
    primitive: temporal
    path_prefixes:
      - milestones/
    extractable: false
    expert_routing: false

  - name: task
    primitive: entity
    path_prefixes:
      - tasks/
    extractable: true
    expert_routing: true

  - name: risk
    primitive: entity
    path_prefixes:
      - risks/
    extractable: true
    expert_routing: true

  - name: decision
    primitive: entity
    path_prefixes:
      - decisions/
    extractable: false
    expert_routing: false

  - name: meeting
    primitive: temporal
    path_prefixes:
      - meetings/
    extractable: false
    expert_routing: false

  - name: stakeholder
    primitive: entity
    path_prefixes:
      - stakeholders/
    extractable: true
    expert_routing: true

link_types: []
