appId: com.pmbrain.desktop
productName: PMBrain
artifactName: PMBrain-Windows-x64-Setup-${version}.${ext}
compression: store
electronDist: node_modules/electron/dist
electronVersion: 36.5.0
directories:
  output: dist
files:
  - out/**/*
extraResources:
  - from: build/extraResources/pmbrain-runtime
    to: pmbrain-runtime
  # Broad file sets omit nested node_modules, so PGLite must be copied explicitly.
  - from: ../node_modules/@electric-sql/pglite
    to: pmbrain-runtime/node_modules/@electric-sql/pglite
  - from: ../node_modules/@napi-rs/canvas
    to: pmbrain-runtime/node_modules/@napi-rs/canvas
  - from: ../node_modules/@napi-rs/canvas-win32-x64-msvc
    to: pmbrain-runtime/node_modules/@napi-rs/canvas-win32-x64-msvc
win:
  target:
    - nsis
  executableName: PMBrain
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
publish:
  provider: github
  owner: zhengyunhui123-dev
  repo: PMBrain
